spring:
  application:
    name: second-class-credit
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/second_class_credit?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8080
