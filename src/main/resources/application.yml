spring:
  application:
    name: second-class-credit
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/second_class_credit?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8080

auth:
  admin:
    username: ${AUTH_ADMIN_USERNAME:admin}
    password: ${AUTH_ADMIN_PASSWORD:admin123}
  jwt:
    secret: ${JWT_SECRET:secondClassCreditJwtSecretKeyForHmacSha256_2026}
    expire-seconds: ${JWT_EXPIRE_SECONDS:7200}
